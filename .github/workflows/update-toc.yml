name: Update README TOC

on:
  push:
    branches: [main]
    paths:
      - "**.mdx"
      - "docs.json"

jobs:
  update-toc:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate TOC
        run: node scripts/update-toc.mjs

      - name: Commit if changed
        run: |
          git diff --quiet README.md && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update README TOC"
          git push
